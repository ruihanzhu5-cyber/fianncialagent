exchange_mode: "candle"

instruments:
  - 600519.SH

exchanges:
  600519.SH:
    # CHANGED FOR DOMESTIC DATA: token-free AkShare A-share tape with qfq adjustment.
    data_source: "akshare"
    symbol_type: "stock"
    candle_interval: "1d"
    spread_factor: 0.001
    warmup_candles: 250
    indicator_kwargs:
      sma_periods: [20, 60, 120, 250]
      rsi_period: 14
      ema_periods: [12, 26]
    news:
      tickers: ["600519.SH"]
      max_results: 20

agents:
  LongHorizon_TradingAgents:
    type: TradingAgentsStockSimAgent
    count: 1
    parameters:
      initial_cash: 1000000
      action_interval: "1d"
      selected_analysts: ["market", "news", "fundamentals"]
      macro_cycle: "month"
      max_drawdown_threshold: 0.18
      min_trade_notional: 10000
      experiment:
        run_id: "ashare_lh_full"
        random_seed: 42
        deterministic_llm_cache: true
        export_decision_trace: true
        export_token_trace: true
        export_microstructure_trace: true
      china_microstructure:
        enabled: true
        use_raw_price_for_execution: true
        use_adjusted_price_for_features: true
        enforce_t_plus_one: true
        enforce_price_limit: true
        enforce_board_lot: true
        tick_size: 0.01
        commission_bps: 3
        stamp_duty_bps_sell: 5
        slippage_model: "fixed_bps"
        slippage_bps: 5
        limit_hit_fill_model: "no_fill_on_one_word_limit"
      long_horizon:
        enable_macro_regime: true
        macro_frequency: "month"
        enable_dynamic_memory: true
        memory_policy: "recency_utility_diversity"
        memory_budget_tokens: 1200
        crisis_memory_pin: true
        enable_tail_risk_veto: true
        risk_metric: "historical_cvar"
        cvar_alpha: 0.95
        cvar_horizon_days: 60
        veto_mode: "mask_or_decay"
        max_single_name_weight: 0.35
      multi_agent_activation:
        policy: "event_triggered"
        full_debate_frequency: "month"
        cheap_daily_gate: true
        activate_news_on_nonempty_events: true
        activate_fundamentals_on_report_windows: true
        early_stop_debate_on_consensus: true
        force_full_debate_every_n_trading_days: 20
      tradingagents_config:
        market_region: "cn"
        data_source: "akshare"
        llm_provider: "openai"
        deep_think_llm: "gpt-4o"
        quick_think_llm: "gpt-4o-mini"
        max_debate_rounds: 1
        max_risk_discuss_rounds: 1
        online_tools: true
        memory_log_max_entries: 80
      initial_positions: {"600519.SH": 0}
      initial_cost_basis: {"600519.SH": 0.0}

  BuyHold_Baseline:
    type: Buy_And_Hold_Trader
    count: 1
    parameters:
      initial_cash: 1000000
      action_interval: "1d"
      quantity_size: 100
      initial_positions: {"600519.SH": 0}
      initial_cost_basis: {"600519.SH": 0.0}

simulation:
  start_time: "2022-01-04T09:30:00"
  end_time: "2024-12-31T15:00:00"
  tick_interval: "1d"
  expected_exchange_agent_count: 1
